<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <title>企業營運戰情中樞</title>
    <style>
      /* 您的完美 CSS 完全保留，一字未改！ */
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
      h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; font-size: 24px; }
      .loading { text-align: center; font-size: 18px; color: #666; margin-top: 50px; }
      .tabs-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
      .tab-btn { padding: 12px 30px; border: none; background: #e9ecef; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: #495057; transition: all 0.3s ease; }
      .tab-btn:hover { background: #dde2e6; }
      .tab-btn.active { background: #0d6efd; color: white; box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3); }
      #btn-tab-conclusions.active { background: #27ae60; box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3); }
      #btn-tab-meeting.active { background: #8e44ad; box-shadow: 0 4px 12px rgba(142, 68, 173, 0.3); }
      
      .global-header { max-width: 1000px; margin: 0 auto 20px auto; }
      .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }

      .kpi-card.danger { border-bottom-color: #dc3545; } .kpi-card.warning { border-bottom-color: #ffc107; } .kpi-card.progress { border-bottom-color: #0d6efd; }

      .kpi-value { font-size: 42px; font-weight: 900; color: #212529; line-height: 1; }
      .kpi-value.danger-text { color: #dc3545; }
      .filter-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }
      .filter-box select { padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 14px; font-weight: bold; outline: none; cursor: pointer; }
      
      .tab-content { display: none; }
      .tab-content.active { display: block; animation: fadeIn 0.4s; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      .overview-table-container { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto 30px auto; max-width: 1000px; }
      .overview-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      .overview-table th, .overview-table td { padding: 14px 12px; text-align: center; border-bottom: 1px solid #dee2e6; font-size: 15px; }
      .overview-table th { background-color: #f8f9fa; color: #495057; font-weight: bold; }
      .overview-table tr:hover { background-color: #f8f9fa; }
      .num-badge { padding: 4px 10px; border-radius: 50px; font-weight: bold; font-size: 14px; }
      .badge-danger { background-color: #ffe3e5; color: #dc3545; } .badge-warning { background-color: #fff3cd; color: #856404; } .badge-primary { background-color: #e7f1ff; color: #0d6efd; } .badge-zero { color: #ccc; font-weight: normal; }
      
      .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
      .user-card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; }
      .user-header { background: #34495e; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; }
      .task-section { padding: 15px; flex-grow: 1; }
      .section-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #eee; }
      .title-pending { color: #e74c3c; border-color: #e74c3c; } .title-progress { color: #3498db; border-color: #3498db; } .title-conclusion { color: #27ae60; border-color: #27ae60; }
      .task-item { background: #f9f9f9; border-left: 4px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; }
      .task-item.pending { border-left-color: #e74c3c; background: #fdf5f4; } .task-item.progress { border-left-color: #3498db; } .task-item.conclusion { border-left-color: #27ae60; background: #f4fdf7; }
      .task-id { font-weight: bold; color: #555; }
      
      .fab-button { position: fixed; bottom: 30px; right: 30px; background-color: #0d6efd; color: white; border-radius: 50px; padding: 15px 25px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.4); cursor: pointer; z-index: 1000; transition: all 0.3s ease; border: none; }
      .fab-button:hover { background-color: #0b5ed7; transform: translateY(-3px); }
      .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 9998; display: none; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
      .custom-modal-content { background-color: #f8f9fa; width: 95%; max-width: 1200px; height: 85vh; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; animation: modalFadeIn 0.3s ease; }
      .custom-modal-header { background-color: #212529; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
      .custom-modal-header h3 { margin: 0; font-size: 22px; }
      .close-btn { color: white; font-size: 28px; cursor: pointer; text-decoration: none; line-height: 1; }
      .custom-modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
      .custom-modal-footer { padding: 15px 20px; background-color: white; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; }
      .task-input-card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #0d6efd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
      .remove-row-btn { position: absolute; top: 15px; right: 15px; background: #dc3545; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
      .form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
      .col-2 { grid-column: span 2; } .col-3 { grid-column: span 3; } .col-4 { grid-column: span 4; } .col-6 { grid-column: span 6; } .col-8 { grid-column: span 8; } .col-12 { grid-column: span 12; }
      .input-label { font-size: 14px; font-weight: bold; color: #495057; margin-bottom: 5px; display: block; }
      .input-field { width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
      textarea.input-field { resize: vertical; }
      .btn-primary-custom { background: #0d6efd; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold;}
      .btn-outline-custom { background: white; color: #0d6efd; border: 1px solid #0d6efd; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold;}
      .sys-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: none; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #0d6efd; flex-direction: column;}
      
      .meeting-container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
      .mic-toolbar { display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; align-items: center;}
      .btn-mic { padding: 10px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 8px;}
      .btn-mic.start { background: #e7f1ff; color: #0d6efd; }
      .btn-mic.stop { background: #ffe3e5; color: #dc3545; display: none; }
      .btn-boss { background: #fff3cd; color: #856404; border: 2px solid #ffc107; font-size: 18px; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: all 0.2s;}
      .btn-boss.active { background: #ffc107; color: #000; box-shadow: 0 0 15px rgba(255,193,7,0.6); transform: scale(1.05); }
      #transcriptBox { width: 100%; height: 400px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; line-height: 1.6; overflow-y: auto; background: #fafafa; color: #666; box-sizing: border-box; }
      .boss-text { color: #b8860b; font-weight: bold; font-size: 18px; background: #fffdf5; padding: 2px 5px; border-radius: 4px; }
      .conflict-alert { background: #ffe3e5; border-left: 4px solid #dc3545; padding: 10px; margin-top: 10px; font-size: 13px; color: #dc3545; border-radius: 4px; font-weight: bold;}
    </style>
  </head>
  
  <body>
    <h1 id="pageTitle">📊 企業營運戰情中樞</h1>

    <div class="tabs-container">
      <button id="btn-tab-overview" class="tab-btn active" onclick="switchTab('view-overview')">📊 待辦數據總覽</button>
      <button id="btn-tab-details" class="tab-btn" onclick="switchTab('view-details')">📝 個人待辦明細</button>
      <button id="btn-tab-conclusions" class="tab-btn" onclick="switchTab('view-conclusions')">📌 會議結論佈達</button>
      <button id="btn-tab-meeting" class="tab-btn" onclick="switchTab('view-meeting')">🎙️ AI 會議梳理台</button>
    </div>

    <div class="global-header" id="globalHeaderBlock">
      <div class="filter-box" id="filterBox">
        <select id="userFilter" onchange="renderDashboard()"><option value="all">👥 全體成員 (顯示全部)</option></select>
        <select id="projectFilter" onchange="renderDashboard()"><option value="all">📁 所有專案/部門</option></select>
        <select id="conclusionStatusFilter" onchange="renderDashboard()" style="display:none; border-color: #27ae60; color: #27ae60;">
          <option value="進行中">🟢 結論：進行中</option><option value="已封存">📁 結論：已封存</option><option value="all">🔍 結論：全部</option>
        </select>
      </div>
      <div class="kpi-container" id="kpiBoard">
        <div class="kpi-card danger"><div class="kpi-title">🚨 逾期待辦</div><div class="kpi-value danger-text" id="kpi-overdue">0</div></div>
        <div class="kpi-card warning"><div class="kpi-title">⚖️ 待主管審批</div><div class="kpi-value" id="kpi-pending">0</div></div>
        <div class="kpi-card progress"><div class="kpi-title">🏃‍♂️ 執行中</div><div class="kpi-value" id="kpi-progress">0</div></div>
      </div>
    </div>

    <div id="loading" class="loading">⏳ 戰情資料即時載入中...</div>

    <div id="view-overview" class="tab-content active">
      <div class="overview-table-container">
        <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #212529; text-align: left;">👥 全員待辦數據統計</h3>
        <table class="overview-table">
          <thead><tr><th style="text-align: left; width: 20%;">成員 (暱稱)</th><th style="width: 15%;">🚨 逾期</th><th style="width: 15%;">⚖️ 待審批</th><th style="width: 15%;">🏃‍♂️ 進行中</th><th style="width: 15%;">📊 待辦總計</th><th style="width: 20%; color: #27ae60;">📌 相關結論</th></tr></thead>
          <tbody id="overviewBody"></tbody>
        </table>
      </div>
    </div>

    <div id="view-details" class="tab-content"><div id="dashboard" class="container"></div></div>
    <div id="view-conclusions" class="tab-content"><div id="conclusionsDashboard" class="container"></div></div>

    <div id="view-meeting" class="tab-content">
      <div class="meeting-container">
        <div class="mic-toolbar">
          <button id="btnMicStart" class="btn-mic start" onclick="startDictation()">🎤 開始錄音</button>
          <button id="btnMicStop" class="btn-mic stop" onclick="stopDictation()">⏹️ 停止錄音</button>
          
          <button id="btnBossToggle" class="btn-boss" onclick="toggleBossMode()">👑 標記：老闆裁示 (點擊開啟)</button>
          
          <div style="flex-grow: 1;"></div>
          <button class="btn-primary-custom" style="background:#8e44ad;" onclick="callAIToProcess()">🤖 呼叫 AI 梳理與防撞檢查</button>
        </div>
        
        <div id="transcriptBox" contenteditable="true" placeholder="點擊開始錄音，或直接在此貼上 Google Meet 的逐字稿..."></div>
        <div style="margin-top: 10px; font-size: 13px; color: #888;">💡 提示：一般討論會以灰色顯示作為 AI 背景參考。按下「老闆裁示」後，文字會變成金色，AI 會以此作為聖旨萃取待辦與結論。</div>
      </div>
    </div>

    <button class="fab-button" onclick="openBatchModal()">➕ 批量建立</button>
    <div id="sysLoading" class="sys-loading"><div id="sysLoadingText">🔄 系統處理中，請稍候...</div></div>
    <div id="batchModal" class="custom-modal-overlay">
      <div class="custom-modal-content">
        <div class="custom-modal-header">
          <h3 id="modalTitle">🚀 批量建立與審核中心</h3>
          <a class="close-btn" onclick="closeBatchModal()">×</a>
        </div>
        <div class="custom-modal-body" id="dynamicTasksContainer"></div>
        <div class="custom-modal-footer">
          <button class="btn-outline-custom" onclick="addBatchRow()">➕ 手動新增一筆</button>
          <button class="btn-primary-custom" onclick="submitBatchTasks()">🚀 確認無誤，寫入並通知</button>
        </div>
      </div>
    </div>

    <script>
      // ⭐ 重要！貼上您的 GAS 網址 ⭐
      const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyKxIMQx_K_-3QmP1lJBOtk1a-GSDsfZgCCNWV9IQjQJ1i3d7ooKQ6K8Flk1ojhcRYMcw/exec"; 

      let globalData = null; 
      const targetUser = 'all'; // 脫鉤後預設為全覽模式
      let sysUsers = []; let sysDepts = []; let isDataLoaded = false; 
      let currentActiveTab = 'view-overview'; 
      let recognition; let isRecording = false; let isBossMode = false;

      window.onload = async function() {
        try {
          // 同時發出兩筆連線去後台拿資料
          const [dashRes, formRes] = await Promise.all([
            fetch(GAS_API_URL + "?action=getData"),
            fetch(GAS_API_URL + "?action=getFormsData")
          ]);
          
          globalData = await dashRes.json();
          const formData = await formRes.json();
          
          sysUsers = formData.users || []; 
          sysDepts = formData.depts || []; 
          isDataLoaded = true;

          document.getElementById('loading').style.display = 'none'; 
          if (targetUser === 'all') {
            for (const [uName, uData] of Object.entries(globalData.usersData)) {
              let displayNick = uData.nickname || uName;
              document.getElementById('userFilter').innerHTML += `<option value="${uName}">👤 ${displayNick}</option>`;
            }
          } else { document.getElementById('userFilter').style.display = 'none'; }
          
          globalData.projects.forEach(p => { document.getElementById('projectFilter').innerHTML += `<option value="${p}">📁 ${p}</option>`; });
          renderDashboard();
        } catch (error) {
          document.getElementById('loading').innerText = "❌ 載入失敗，請確認 API 網址。";
          console.error("載入錯誤:", error);
        }
        initSpeechRecognition();
      };

      function switchTab(tabId) {
        currentActiveTab = tabId;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        if (tabId === 'view-overview') { document.getElementById('btn-tab-overview').classList.add('active'); } 
        else if (tabId === 'view-details') { document.getElementById('btn-tab-details').classList.add('active'); }
        else if (tabId === 'view-conclusions') { document.getElementById('btn-tab-conclusions').classList.add('active'); }
        else { document.getElementById('btn-tab-meeting').classList.add('active'); }

        if (tabId === 'view-meeting') {
          document.getElementById('globalHeaderBlock').style.display = 'none'; 
        } else {
          document.getElementById('globalHeaderBlock').style.display = 'block';
          if (tabId === 'view-conclusions') {
            document.getElementById('conclusionStatusFilter').style.display = 'inline-block'; document.getElementById('kpiBoard').style.display = 'none';
          } else {
            document.getElementById('conclusionStatusFilter').style.display = 'none'; document.getElementById('kpiBoard').style.display = 'grid'; 
          }
        }
        renderDashboard();
      }

      function toggleDate(selectElem) {
        const row = selectElem.closest('.form-grid'); const dateInput = row.querySelector('.t-date');
        if (selectElem.value === '結論') { dateInput.value = ''; dateInput.disabled = true; dateInput.style.backgroundColor = '#e9ecef'; } 
        else { dateInput.disabled = false; dateInput.style.backgroundColor = '#fff'; }
      }

      // 您的渲染卡片邏輯完全保留
      function renderDashboard() {
        if (!globalData || currentActiveTab === 'view-meeting') return;
        const dash = document.getElementById('dashboard'); dash.innerHTML = ''; 
        const cDash = document.getElementById('conclusionsDashboard'); cDash.innerHTML = ''; 
        const fUser = targetUser === 'all' ? document.getElementById('userFilter').value : targetUser;
        const fProj = document.getElementById('projectFilter').value;
        const cStatus = document.getElementById('conclusionStatusFilter').value;

        let countOverdue = 0; let countPending = 0; let countProgress = 0;
        const today = new Date(); today.setHours(0, 0, 0, 0); let tableRowsHtml = '';

        for (const [userName, userData] of Object.entries(globalData.usersData)) {
          let userNick = userData.nickname || userName;
          let filteredPending = userData.pendingApproval.filter(t => fProj === 'all' || t.project === fProj);
          let filteredProgress = userData.inProgress.filter(t => fProj === 'all' || t.project === fProj);
          let filteredConclusionsForTable = userData.conclusions.filter(t => fProj === 'all' || t.project === fProj); 
          
          let userOverdue = 0; const allUserTasks = [...filteredPending, ...filteredProgress]; 
          allUserTasks.forEach(t => { if (t.date && t.date !== '') { let tDate = new Date(t.date); if (!isNaN(tDate.getTime()) && tDate < today) { userOverdue++; } } });

          if (fUser === 'all' || fUser === userName) { countPending += filteredPending.length; countProgress += filteredProgress.length; countOverdue += userOverdue; }
          let totalUserTasks = filteredPending.length + filteredProgress.length;
          
          if (fUser === 'all' || fUser === userName) {
            tableRowsHtml += `<tr><td style="text-align: left; font-weight: bold; color: #212529;">👤 ${userNick}</td><td><span class="num-badge ${userOverdue > 0 ? 'badge-danger' : 'badge-zero'}">${userOverdue}</span></td><td><span class="num-badge ${filteredPending.length > 0 ? 'badge-warning' : 'badge-zero'}">${filteredPending.length}</span></td><td><span class="num-badge ${filteredProgress.length > 0 ? 'badge-primary' : 'badge-zero'}">${filteredProgress.length}</span></td><td style="font-weight: bold; color: #495057; font-size: 16px;">${totalUserTasks}</td><td><span class="num-badge ${filteredConclusionsForTable.length > 0 ? 'badge-zero' : 'badge-zero'}" style="color:#27ae60;">${filteredConclusionsForTable.length}</span></td></tr>`;
          }

          if (currentActiveTab === 'view-details' && (fUser === 'all' || fUser === userName)) {
            if (filteredPending.length > 0 || filteredProgress.length > 0) {
              let html = `<div class="user-card"><div class="user-header" style="background:#34495e;">👤 ${userNick} 的待辦任務</div>`;
              if (filteredPending.length > 0) {
                html += `<div class="task-section"><div class="section-title title-pending">🔥 待主管審批 (${filteredPending.length})</div>`;
                filteredPending.forEach(t => { html += `<div class="task-item pending"><span class="task-id">[${t.id}] ${t.project}</span><br><span style="font-weight:bold; font-size:15px;">${t.content}</span><div style="font-size: 13px; color: #555; margin-top: 6px; background-color: #fff; padding: 8px; border-radius: 4px;">📖 細節：${t.details || '無詳細說明'}</div><i style="color:#888; font-size:11px;">📅 ${t.date}</i></div>`; });
                html += `</div>`;
              }
              if (filteredProgress.length > 0) {
                html += `<div class="task-section"><div class="section-title title-progress">🏃‍♂️ 進行中 (${filteredProgress.length})</div>`;
                filteredProgress.forEach(t => { html += `<div class="task-item progress"><span class="task-id">[${t.id}] ${t.project}</span><br><span style="font-weight:bold; font-size:15px;">${t.content}</span><div style="font-size: 13px; color: #555; margin-top: 6px; background-color: #fff; padding: 8px; border-radius: 4px;">📖 細節：${t.details || '無詳細說明'}</div><i style="color:#888; font-size:11px;">📅 ${t.date}</i><br><b style="color:#3498db;font-size:12px;">💬 ${t.latestLog}</b></div>`; });
                html += `</div>`;
              }
              html += `</div>`; dash.innerHTML += html;
            }
          }

          if (currentActiveTab === 'view-conclusions' && (fUser === 'all' || fUser === userName)) {
            let filteredConclusions = userData.conclusions.filter(t => { let matchProj = (fProj === 'all' || t.project === fProj); let matchStatus = (cStatus === 'all' || t.status === cStatus); if (cStatus === '進行中' && t.status !== '已封存') matchStatus = true; return matchProj && matchStatus; });
            if (filteredConclusions.length > 0) {
              let cHtml = `<div class="user-card" style="border: 1px solid #27ae60;"><div class="user-header" style="background:#27ae60;">📌 ${userNick} 相關結論</div><div class="task-section" style="background:#f4fdf7;">`;
              filteredConclusions.forEach(t => { 
                let isArchived = (t.status === '已封存'); let bgColor = isArchived ? '#f8f9fa' : '#ffffff'; let borderColor = isArchived ? '#adb5bd' : '#27ae60'; let tagColor = isArchived ? '#6c757d' : '#0f5132'; let tagBg = isArchived ? '#e9ecef' : '#d1e7dd'; let displayStatus = isArchived ? '已封存' : '進行中';
                cHtml += `<div class="task-item" style="border-left-color: ${borderColor}; background-color: ${bgColor};"><span class="task-id">[${t.id}] ${t.project}</span><span class="num-badge" style="float:right; font-size:11px; padding:2px 8px; background:${tagBg}; color:${tagColor};">${displayStatus}</span><br><span style="font-weight:bold; font-size:15px; color:${isArchived ? '#6c757d' : '#333'};">${t.content}</span><div style="font-size: 13px; color: #555; margin-top: 6px; background-color: #f1f3f5; padding: 8px; border-radius: 4px;">📖 內容：${t.details || '無詳細說明'}</div></div>`; 
              });
              cHtml += `</div></div>`; cDash.innerHTML += cHtml;
            }
          }
        }
        document.getElementById('overviewBody').innerHTML = tableRowsHtml;
        document.getElementById('kpi-overdue').innerText = countOverdue; document.getElementById('kpi-pending').innerText = countPending; document.getElementById('kpi-progress').innerText = countProgress;
        if(currentActiveTab === 'view-details' && dash.innerHTML === '') { dash.innerHTML = '<div class="loading" style="grid-column: span 12;">🎉 目前篩選條件下無任何積壓待辦任務！</div>'; }
        if(currentActiveTab === 'view-conclusions' && cDash.innerHTML === '') { cDash.innerHTML = '<div class="loading" style="grid-column: span 12;">📂 目前無相關結論紀錄。</div>'; }
      }

      function initSpeechRecognition() {
        if ('webkitSpeechRecognition' in window) {
          recognition = new webkitSpeechRecognition();
          recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'zh-TW';
          recognition.onresult = function(event) {
            let final_transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) { final_transcript += event.results[i][0].transcript; }
            }
            if (final_transcript) {
              const span = document.createElement('span');
              if (isBossMode) {
                span.className = 'boss-text';
                span.textContent = "【👑老闆裁示：" + final_transcript + "】 ";
              } else {
                span.textContent = final_transcript + "，";
              }
              document.getElementById('transcriptBox').appendChild(span);
              document.getElementById('transcriptBox').scrollTop = document.getElementById('transcriptBox').scrollHeight;
            }
          };
          recognition.onerror = function(event) { console.error("Speech error", event); };
          recognition.onend = function() { if (isRecording) { recognition.start(); } }; 
        } else {
          alert("您目前的瀏覽器不支援語音辨識，請使用 Google Chrome 瀏覽器。");
        }
      }

      function startDictation() {
        if (!recognition) return;
        isRecording = true; recognition.start();
        document.getElementById('btnMicStart').style.display = 'none'; document.getElementById('btnMicStop').style.display = 'flex';
        document.getElementById('transcriptBox').innerHTML += "<div style='color:#ccc; font-size:12px;'>--- 錄音開始 ---</div><br>";
      }

      function stopDictation() {
        isRecording = false; recognition.stop();
        document.getElementById('btnMicStart').style.display = 'flex'; document.getElementById('btnMicStop').style.display = 'none';
        document.getElementById('transcriptBox').innerHTML += "<br><div style='color:#ccc; font-size:12px;'>--- 錄音結束 ---</div><br>";
      }

      function toggleBossMode() {
        isBossMode = !isBossMode;
        const btn = document.getElementById('btnBossToggle');
        if (isBossMode) {
          btn.classList.add('active'); btn.innerText = "👑 老闆裁示收音中 (點擊關閉)";
        } else {
          btn.classList.remove('active'); btn.innerText = "👑 標記：老闆裁示 (點擊開啟)";
        }
      }

      // 改用 Fetch 呼叫 AI 大腦
      async function callAIToProcess() {
        const text = document.getElementById('transcriptBox').innerText.trim();
        if (text.length < 10) { alert("逐字稿內容太少，請先錄音或貼上會議紀錄！"); return; }
        
        document.getElementById('sysLoading').style.display = 'flex';
        document.getElementById('sysLoadingText').innerText = "🤖 AI 大腦正在萃取待辦與防撞檢查中，請稍候...";
        
        try {
          const response = await fetch(GAS_API_URL + "?action=processAI", {
            method: 'POST',
            body: JSON.stringify({ text: text }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await response.json();
          
          document.getElementById('sysLoading').style.display = 'none';
          if(result.status === 'success' && result.data) {
            const aiDrafts = result.data;
            document.getElementById('modalTitle').innerText = "🤖 AI 智慧梳理草稿 (請確認並壓上日期)";
            document.getElementById('batchModal').style.display = 'flex';
            document.getElementById('dynamicTasksContainer').innerHTML = ''; 
            
            if (!aiDrafts || !aiDrafts.items || aiDrafts.items.length === 0) {
              alert("AI 判斷本次會議沒有具體的待辦或結論。"); return;
            }
            aiDrafts.items.forEach(draft => { addBatchRow(draft); });
          } else {
            throw new Error(result.message || "AI 回傳錯誤");
          }
        } catch(err) {
          document.getElementById('sysLoading').style.display = 'none'; alert("❌ AI 呼叫失敗：\n" + err.message);
        }
      }

      function openBatchModal() {
        document.getElementById('modalTitle').innerText = "🚀 批量建立中心";
        document.getElementById('batchModal').style.display = 'flex';
        if(document.getElementById('dynamicTasksContainer').children.length === 0) { addBatchRow(); }
      }

      function closeBatchModal() { document.getElementById('batchModal').style.display = 'none'; }

      function addBatchRow(draft = null) {
        const container = document.getElementById('dynamicTasksContainer');
        const row = document.createElement('div'); row.className = 'task-input-card';
        if (draft && draft.conflict) { row.style.borderLeft = "5px solid #dc3545"; }

        let deptOpts = '<option value="" selected disabled>請選擇部門</option>'; sysDepts.forEach(d => deptOpts += `<option value="${d}">${d}</option>`);
        let userOpts = '<option value="" selected disabled>請選擇負責人</option>'; sysUsers.forEach(u => userOpts += `<option value="${u.realName}">${u.nickName} (${u.realName})</option>`);
        let coOwnerOpts = '';
        sysUsers.forEach((u, i) => { let uniqueId = 'cb_' + Math.random().toString(36).substr(2, 9) + '_' + i; coOwnerOpts += `<div style="display:inline-block; margin-right:12px; margin-bottom:5px;"><input type="checkbox" id="${uniqueId}" value="${u.realName}" class="t-coowner-cb"><label for="${uniqueId}" style="cursor:pointer; margin-left:3px;">${u.nickName}</label></div>`; });

        let preType = draft ? draft.type : '待辦';
        let preSummary = draft ? draft.summary : '';
        let preDetails = draft ? draft.details : '';
        let dateDisabled = preType === '結論' ? 'disabled style="background-color:#e9ecef"' : '';
        
        let conflictHtml = '';
        if (draft && draft.conflict) {
          conflictHtml = `<div class="col-12 conflict-alert">🚨 <b>AI 防撞雷達警告：</b> ${draft.conflict}<br><span style="color:#333; font-weight:normal; margin-top:5px; display:inline-block;">若確定要推翻前案，請在右方填寫欲覆蓋的歷史任務 ID 👉</span><input type="text" class="input-field t-override" placeholder="如: T015" style="width:120px; display:inline-block; margin-left:10px;"></div>`;
        }

        row.innerHTML = `
          <button class="remove-row-btn" onclick="this.parentElement.remove()">移除</button>
          <div class="form-grid">
            ${conflictHtml}
            <div class="col-2"><label class="input-label">記錄類型</label><select class="input-field t-record-type" onchange="toggleDate(this)"><option value="待辦" ${preType==='待辦'?'selected':''}>📝 待辦</option><option value="結論" ${preType==='結論'?'selected':''}>📌 結論</option></select></div>
            <div class="col-2"><label class="input-label">等級</label><select class="input-field t-level"><option value="A.緊急重要">🔴 A級</option><option value="B.重要任務">🟡 B級</option><option value="C.一般任務" selected>🟢 C級</option></select></div>
            <div class="col-4"><label class="input-label">部門</label><select class="input-field t-dept">${deptOpts}</select></div>
            <div class="col-4"><label class="input-label">負責人/相關人</label><select class="input-field t-owner">${userOpts}</select></div>
            
            <div class="col-4"><label class="input-label">到期日 (結論免填)</label><input type="date" class="input-field t-date" ${dateDisabled}></div>
            <div class="col-8"><label class="input-label">簡述 (必填)</label><textarea class="input-field t-summary" rows="2" placeholder="請輸入標題或主要大綱...">${preSummary}</textarea></div>
            
            <div class="col-12"><label class="input-label">協辦人 (可複選)</label><div class="input-field" style="height: auto; max-height: 80px; overflow-y: auto; background-color: #fff;">${coOwnerOpts}</div></div>
            <div class="col-12"><label class="input-label">詳細內容/備忘</label><textarea class="input-field t-details" rows="3" placeholder="細節內容...">${preDetails}</textarea></div>
            ${!draft || !draft.conflict ? `<input type="hidden" class="t-override" value="">` : ''}
          </div>`;
        container.appendChild(row); container.scrollTop = container.scrollHeight;
      }

      // 改用 Fetch 寫入任務
      async function submitBatchTasks() {
        const cards = document.querySelectorAll('.task-input-card');
        let tasks = []; let hasError = false;
        cards.forEach((card, index) => {
          const recordType = card.querySelector('.t-record-type').value;
          const level = card.querySelector('.t-level').value; const dept = card.querySelector('.t-dept').value;
          const owner = card.querySelector('.t-owner').value; const date = card.querySelector('.t-date').value;
          const summary = card.querySelector('.t-summary').value.trim(); const details = card.querySelector('.t-details').value.trim();
          const overrideId = card.querySelector('.t-override') ? card.querySelector('.t-override').value.trim() : "";
          
          let checkedCoOwners = []; card.querySelectorAll('.t-coowner-cb:checked').forEach(cb => checkedCoOwners.push(cb.value));
          const coOwners = checkedCoOwners.join(", ");

          if(!dept || !owner || !summary || (recordType === '待辦' && !date)) { alert(`第 ${index + 1} 筆紀錄不完整！\n「部門、負責人、簡述」必填。\n若為待辦，還需填寫「到期日」。`); hasError = true; return; }
          tasks.push({ recordType: recordType, level: level, dept: dept, owner: owner, dueDate: date, summary: summary, details: details, coOwners: coOwners, overrideId: overrideId });
        });

        if(hasError || tasks.length === 0) return;
        if(confirm(`確定送出這 ${tasks.length} 筆紀錄並觸發 LINE 通知嗎？`)) {
          document.getElementById('sysLoading').style.display = 'flex';
          document.getElementById('sysLoadingText').innerText = "🔄 寫入資料與發送 LINE 通知中...";
          
          try {
            const response = await fetch(GAS_API_URL + "?action=submitTasks", {
              method: 'POST',
              body: JSON.stringify(tasks),
              headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            const result = await response.json();
            
            if(result.status === 'success') {
                document.getElementById('sysLoading').style.display = 'none'; alert(`🎉 成功寫入 ${result.count} 筆紀錄！`);
                closeBatchModal(); document.getElementById('dynamicTasksContainer').innerHTML = '';
                
                // 重新載入最新資料並刷新畫面
                const dashRes = await fetch(GAS_API_URL + "?action=getData");
                globalData = await dashRes.json();
                renderDashboard();
            } else {
                throw new Error(result.message);
            }
          } catch(err) {
            document.getElementById('sysLoading').style.display = 'none'; alert("❌ 送出失敗：\n" + err.message);
          }
        }
      }
    </script>
  </body>
</html>
